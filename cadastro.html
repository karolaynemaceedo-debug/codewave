<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CodeWave - Criar Conta</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>

    <div class="formulario" id="formulario">
        <h2>Criar Conta Codewave</h2>

        <form id="Cadastro">
            <div class="campo">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" minlength="15" maxlength="60" placeholder="15 a 60 caracteres" required>
            </div>
            <div class="campo">
                <label for="nomeMaterno">Nome da Mãe</label>
                <input type="text" id="nomeMaterno" placeholder="Nome da mãe" required>
            </div>

            <div class="campo-grupo">
                <div class="campo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>
                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
            </div>


            <div class="campo">
                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
            </div>
            <div class="campo">
                <label for="endereco">Endereço Completo</label>
                <input type="text" id="endereco" required>
            </div>


            <div class="campo">
                <label for="login">Login (Usuário)</label>
                <input type="text" id="login" minlength="6" maxlength="6" placeholder="Exatos 6 caracteres" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" minlength="8" placeholder="Mín. 8 caracteres" required>
            </div>
            <div class="campo">
                <label for="confirmar-senha">Confirmação</label>
                <input type="password" id="confirmar-senha" required>
            </div>

            <button type="submit" class="btn-principal-full" onclick="salvarCadastro()">Finalizar Cadastro</button>

            <div class="links-auxiliares">
                <a href="login.html">Já tem uma conta? Entrar</a>
            </div>
            <div class="links-auxiliares">
                <a href="index.html">Início</a>
            </div>
        </form>
    </div>
    <script src="js/script.js" defer></script>
</body>

</html>
